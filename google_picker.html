<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow">
        <title>Google Drive Picker</title>
        <link rel="icon" href="images/icon.png" type="image/png">
        <style>
            html, body, div, span, iframe, * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                background: transparent !important;
            }
            
            html, body {
                background-color: transparent !important;
                background: transparent !important;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
                width: 100vw;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .spinner { 
                width: 40px; 
                height: 40px; 
                border: 4px solid #f3f3f3; 
                border-radius: 50%; 
                border-top: 4px solid #3498db; 
                animation: spin 1s linear infinite;
                margin-bottom: 15px;
            }
            
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            
            .picker-dialog {
                width: 100% !important;
                max-width: 100% !important;
                height: 100% !important;
                border-radius: 12px !important;
                overflow: hidden !important;
                background-color: transparent !important;
            }
            
            .picker-dialog-content {
                width: 100% !important;
                height: 100% !important;
                border-radius: 12px !important;
                background-color: transparent !important;
            }
        </style>
    </head>
<body>
    <div id="loading" style="text-align: center;">
        <div class="spinner"></div>
    </div>

<script>
    // Global variables — populated from URL fragment on DOMContentLoaded
    let DEVELOPER_KEY = '';
    let APP_ID = '';
    let ACCESS_TOKEN = '';
    let gapi_loaded = false;
    let picker_loaded = false;
    let scripts_loaded = false;

    // Read a parameter from the URL fragment (#key=value&key2=value2).
    // Credentials are passed via fragment (not query params) so they are never
    // sent to the server or stored in access logs.
    function getFragmentParam(name) {
        const hash = window.location.hash.substring(1); // strip leading '#'
        return new URLSearchParams(hash).get(name);
    }

    // Return the result to the Flutter app by redirecting to the custom URL
    // scheme. iOS intercepts xcelerationapp:// URLs, closes the Safari sheet,
    // and delivers the URL to the app via app_links.
    function sendToFlutter(data) {
        const params = new URLSearchParams();
        if (data.action === 'picked') {
            const file = data.data;
            params.set('action', 'picked');
            params.set('fileId', file.id);
            params.set('fileName', file.name);
            params.set('mimeType', file.mimeType);
        } else if (data.action === 'canceled') {
            params.set('action', 'canceled');
        } else {
            params.set('action', 'error');
            params.set('message', data.message || 'Unknown error');
        }
        window.location.href = 'xcelerationapp://picker?' + params.toString();
    }

    function onGapiLoad() {
        gapi_loaded = true;
        checkReadyAndInit();
    }

    function onPickerLoad() {
        picker_loaded = true;
        checkReadyAndInit();
    }

    function checkReadyAndInit() {
        if (gapi_loaded && picker_loaded && scripts_loaded && DEVELOPER_KEY && ACCESS_TOKEN) {
            initializePicker();
        }
    }

    function initializePicker() {
        try {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';

            const spreadsheetView = new google.picker.DocsView()
                .setMimeTypes('application/vnd.google-apps.spreadsheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv')
                .setMode(google.picker.DocsViewMode.LIST);

            const picker = new google.picker.PickerBuilder()
                .setDeveloperKey(DEVELOPER_KEY)
                .setOAuthToken(ACCESS_TOKEN)
                .setAuthUser(0)
                .setOrigin('https://xceleration-app.github.io/')
                .addView(spreadsheetView)
                .setTitle('Select a Spreadsheet')
                .enableFeature(google.picker.Feature.NAV_HIDDEN)
                .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                .setAppId(APP_ID)
                .setCallback(pickerCallback)
                .build();

            picker.setVisible(true);
        } catch (e) {
            sendToFlutter({ action: 'error', message: 'Failed to initialize picker: ' + e });
        }
    }

    function pickerCallback(data) {
        if (data.action === google.picker.Action.PICKED) {
            sendToFlutter({ action: 'picked', data: data.docs[0] });
        } else if (data.action === google.picker.Action.CANCEL) {
            sendToFlutter({ action: 'canceled' });
        }
    }

    function loadGoogleAPIs() {
        const gapiScript = document.createElement('script');
        gapiScript.src = 'https://apis.google.com/js/api.js';
        gapiScript.onload = function() {
            gapi.load('picker', {
                callback: onGapiLoad,
                onerror: function(e) {
                    sendToFlutter({ action: 'error', message: 'Failed to load Google Picker API' });
                }
            });
        };
        gapiScript.onerror = function() {
            sendToFlutter({ action: 'error', message: 'Failed to load Google API script' });
        };
            
        const pickerScript = document.createElement('script');
        pickerScript.src = 'https://apis.google.com/js/picker.js';
        pickerScript.onload = onPickerLoad;
        pickerScript.onerror = function() {
            sendToFlutter({ action: 'error', message: 'Failed to load Google Picker script' });
        };
        
        document.head.appendChild(gapiScript);
        document.head.appendChild(pickerScript);
        
        scripts_loaded = true;
    }

    document.addEventListener('DOMContentLoaded', function() {
        // Read credentials from URL fragment — set before loading Google APIs
        // so they are available when checkReadyAndInit() fires.
        DEVELOPER_KEY = getFragmentParam('devKey') || '';
        ACCESS_TOKEN = getFragmentParam('token') || '';
        APP_ID = getFragmentParam('appId') || '';

        if (!DEVELOPER_KEY || !ACCESS_TOKEN) {
            sendToFlutter({ action: 'error', message: 'Missing picker credentials' });
            return;
        }

        loadGoogleAPIs();
    });
</script>
</body>
</html>
